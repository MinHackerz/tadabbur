<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#fffdf6"/>
      <stop offset="65%" stop-color="#faf6ec"/>
      <stop offset="100%" stop-color="#f2e9d2"/>
    </radialGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#b8924a"/>
    </linearGradient>
  </defs>

  <!-- Parchment disc -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#b8924a" stroke-width="1.5" stroke-opacity="0.55"/>
  <circle cx="32" cy="32" r="25" fill="none" stroke="#b8924a" stroke-width="0.8" stroke-opacity="0.35"/>

  <!-- Stylized ت (Ta) — top arc -->
  <path d="M 20 28 Q 24 24, 32 24 Q 40 24, 44 28"
        stroke="url(#ink)" stroke-width="3.6" stroke-linecap="round" fill="none"/>
  <circle cx="27" cy="18" r="2.4" fill="url(#ink)"/>
  <circle cx="37" cy="18" r="2.4" fill="url(#ink)"/>

  <!-- Stylized د (Dal) — flowing curve -->
  <path d="M 22 36 Q 26 32, 32 32 Q 38 32, 42 36 Q 44 38, 44 41"
        stroke="url(#ink)" stroke-width="3.6" stroke-linecap="round" fill="none"/>

  <!-- Base flourish -->
  <path d="M 20 44 Q 32 48, 44 44"
        stroke="#b8924a" stroke-width="2.4" stroke-linecap="round" fill="none" opacity="0.6"/>
  <circle cx="32" cy="40" r="1.5" fill="#b8924a" opacity="0.45"/>
</svg>
